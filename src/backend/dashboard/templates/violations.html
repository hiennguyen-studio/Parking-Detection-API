{% extends "base.html" %}

{% block content %}
<div class="violations-page">
    <h2>Danh Sách Vi Phạm</h2>

    <div class="filters">
        <input type="text" id="filter-plate" placeholder="Tìm kiếm biển số...">
        <select id="filter-status">
            <option value="">Tất cả</option>
            <option value="confirmed">Đã xác nhận</option>
            <option value="unconfirmed">Chưa xác nhận</option>
        </select>
        <button onclick="applyFilters()">Lọc</button>
    </div>

    <table class="violations-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Biển Số</th>
                <th>Camera</th>
                <th>Vị Trí</th>
                <th>Độ Tin Cậy</th>
                <th>Trạng Thái</th>
                <th>Thời Gian</th>
                <th>Hành Động</th>
            </tr>
        </thead>
        <tbody id="violations-tbody">
        </tbody>
    </table>

    <div class="pagination">
        <button onclick="previousPage()">Trước</button>
        <span id="page-info">Trang 1</span>
        <button onclick="nextPage()">Sau</button>
    </div>
</div>

<script>
    loadViolations();
</script>
{% endblock %}
